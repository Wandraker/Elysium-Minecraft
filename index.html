    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function ruleCard(rule) {
      const [num, title, text, punishment, level] = rule;
      return `
        <article class="rule-card ${escapeHTML(level)}">
          <div class="rule-top">
            <div class="rule-num">${escapeHTML(num)}</div>
            <h3>${escapeHTML(title)}</h3>
          </div>
          <p>${escapeHTML(text)}</p>
          <div class="punishment"><span>➤</span> ${escapeHTML(punishment)}</div>
        </article>
      `;
    }

      return `

            <h2>${escapeHTML(title)}</h2>
            <p>${escapeHTML(desc)}</p>

          <div class="cards">
            ${rules.map(ruleCard).join("")}
          </div>
        </section>

    }

    function statsBlock(stats) {

    const routeAliases = {
      "elysium": "elysium",
      "home": "elysium",
      "rules": "rules",
      "java-rules": "java",
      "bedrock-rules": "bedrock",
      "chat-rules": "chat",
      "java": "java",
      "bedrock": "bedrock",
      "chat": "chat",
      "donate": "donate",
      "support": "donate"
    };

    const routeHashes = {
      "elysium": "elysium",
      "rules": "rules",
      "java": "java-rules",
      "bedrock": "bedrock-rules",
      "chat": "chat-rules",
      "donate": "donate"
    };

    function normalizeRoute(target) {
      return routeAliases[String(target || "elysium").replace("#", "").toLowerCase()] || "elysium";
    }

    function render(target, updateHash = true) {
      const key = normalizeRoute(target);

      if (key === "elysium") {
        app.innerHTML = elysiumView();
      } else if (key === "rules") {
        app.innerHTML = rulesView();
      } else if (key === "donate") {
        app.innerHTML = donateView();
      } else {
        app.innerHTML = sectionView(key);
      }

      document.querySelectorAll("[data-target]").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.target));
      });

      if (updateHash) {
        history.pushState(null, "", "#" + routeHashes[key]);
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fromHash() {
      const hash = location.hash.replace("#", "").toLowerCase();
      return normalizeRoute(hash || "elysium");
    }

    window.addEventListener("popstate", () => render(fromHash(), false));

    render(fromHash(), false);
  </script>
